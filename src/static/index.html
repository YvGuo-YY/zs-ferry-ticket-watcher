<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>嵊泗渡轮抢票系统</title>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
#app { height: 100vh; display: flex; flex-direction: column; }

/* ── 登录页 ─────────────────────────── */
.login-page {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; background: linear-gradient(135deg, #1a6fb3 0%, #0d4a7d 100%);
}
.login-card {
  width: 380px; padding: 40px 36px; background: #fff;
  border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo .icon { font-size: 48px; }
.login-logo h2 { font-size: 20px; color: #1a6fb3; margin-top: 8px; font-weight: 700; }
.login-logo p { font-size: 13px; color: #999; margin-top: 4px; }

/* ── 主布局 ─────────────────────────── */
.layout { display: flex; height: 100vh; overflow: hidden; }
.sidebar {
  width: 220px; background: #001529; color: #fff;
  display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar-header {
  padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-header .logo { font-size: 24px; }
.sidebar-header .title { font-size: 14px; font-weight: 700; line-height: 1.3; color: #fff; }
.sidebar-header .subtitle { font-size: 11px; color: rgba(255,255,255,0.45); }
.sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 12px 20px;
  cursor: pointer; color: rgba(255,255,255,0.65); font-size: 14px;
  transition: all 0.2s; border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: #1a6fb3; color: #fff; border-left-color: #40a9ff; }
.nav-item .icon { font-size: 17px; width: 20px; text-align: center; }
.sidebar-footer {
  padding: 16px; border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 12px; color: rgba(255,255,255,0.4);
}
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: 56px; background: #fff; border-bottom: 1px solid #e8e8e8;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.topbar-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── 通用 ────────────────────────────── */
.page-header { margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
.page-header h3 { font-size: 17px; font-weight: 600; color: #1a1a1a; }

/* ── 任务卡片 ────────────────────────── */
.task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.task-card {
  background: #fff; border-radius: 10px; padding: 18px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer;
  border: 2px solid transparent; transition: all 0.2s;
}
.task-card:hover { border-color: #1a6fb3; box-shadow: 0 4px 16px rgba(26,111,179,0.15); }
.task-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.task-route { font-size: 16px; font-weight: 700; color: #1a1a1a; display: flex; align-items: center; gap: 6px; }
.task-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.task-meta-item { font-size: 12px; color: #666; }
.task-meta-item span { color: #1a1a1a; font-weight: 500; }
.task-footer { display: flex; align-items: center; justify-content: space-between; }
.task-passengers { font-size: 12px; color: #888; }
.child-tasks { margin-top: 8px; margin-left: 24px; display: flex; flex-direction: column; gap: 8px; }
.child-task-card { border-left: 3px solid #1a6fb3; background: #f5f9ff; }

/* ── 日志 ────────────────────────────── */
.log-container {
  background: #0d1117; border-radius: 8px; padding: 12px 16px;
  font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px;
  height: 360px; overflow-y: auto; color: #c9d1d9;
}
.log-line { padding: 2px 0; line-height: 1.6; }
.log-line.INFO { color: #79c0ff; }
.log-line.WARN { color: #f0883e; }
.log-line.ERROR { color: #ff7b72; }
.log-time { color: #6e7681; margin-right: 8px; }

/* ── 端口选择 ────────────────────────── */
.port-select-container { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

/* ── 订单列表 ────────────────────────── */
.orders-page { display: flex; flex-direction: column; gap: 14px; }
.orders-toolbar {
  display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.orders-filter-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.orders-meta-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.order-filter-tag { cursor: pointer; border-radius: 999px; padding: 0 4px; }
.orders-empty {
  text-align: center; padding: 52px 24px; color: #8c8c8c;
  background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(15, 35, 60, 0.05);
}
.orders-table-card {
  background: #fff; border-radius: 14px; box-shadow: 0 4px 18px rgba(15, 35, 60, 0.06);
  overflow: hidden;
}
.orders-table .el-table__cell { padding: 12px 0; vertical-align: top; word-break: normal; }
.order-id {
  font-family: 'SFMono-Regular', 'Consolas', monospace; font-size: 13px; font-weight: 600; color: #364152;
  display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.route-cell, .sail-cell, .travel-date-cell { display: flex; flex-direction: column; gap: 4px; line-height: 1.45; min-width: 0; }
.route-main, .sail-main, .travel-date-main {
  font-size: 14px; color: #1f2937; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.route-sub, .sail-sub, .travel-date-sub { font-size: 12px; color: #8a94a6; }
.compact-passengers { display: flex; flex-wrap: wrap; gap: 6px; }
.deadline-stack { display: flex; flex-direction: column; gap: 4px; line-height: 1.35; }
.deadline-main { font-size: 14px; font-weight: 600; }
.deadline-sub { font-size: 12px; color: #98a2b3; }
.orders-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.order-detail-grid {
  display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px 18px; margin-bottom: 16px; font-size: 13px; color: #444;
}
.order-detail-grid .muted { color: #8a94a6; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
<script src="https://unpkg.com/@element-plus/icons-vue/dist/index.iife.min.js"></script>

<script>
const { createApp, ref, reactive, computed, onMounted, onUnmounted, watch, nextTick } = Vue;
const { ElMessage, ElMessageBox, ElNotification } = ElementPlus;

// ─── API 工具 ──────────────────────────────────────────────
const TOKEN_KEY = "ferry_token";
const USER_KEY  = "ferry_user";

function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }
function getUser()  { return JSON.parse(localStorage.getItem(USER_KEY) || "null"); }
function setAuth(token, user) {
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(USER_KEY, JSON.stringify(user));
}
function clearAuth() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(USER_KEY);
}

async function api(method, path, body = null) {
  const opts = {
    method,
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${getToken()}` },
  };
  if (body !== null) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 401) { clearAuth(); location.reload(); }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || "请求失败");
  }
  if (res.status === 204) return null;
  return res.json();
}

const http = {
  get:    (p)       => api("GET",    p),
  post:   (p, b)    => api("POST",   p, b),
  put:    (p, b)    => api("PUT",    p, b),
  patch:  (p, b)    => api("PATCH",  p, b),
  delete: (p)       => api("DELETE", p),
};

// ─── 格式化工具 ───────────────────────────────────────────
function fmtDate(s) {
  if (!s) return "-";
  return new Date(s).toLocaleString("zh-CN", { hour12: false });
}
function statusLabel(s) {
  return { pending:"等待中", running:"运行中", booked:"已下单", failed:"失败", stopped:"已停止", waiting:"等待触发" }[s] || s;
}
function statusType(s) {
  return { pending:"info", running:"primary", booked:"success", failed:"danger", stopped:"warning", waiting:"info" }[s] || "info";
}

// ══════════════════════════════════════════════════════════
// 主应用
// ══════════════════════════════════════════════════════════
const App = {
  template: `
  <!-- 登录页 -->
  <div v-if="!isLoggedIn" class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">⛴️</div>
        <h2>嵊泗渡轮抢票系统</h2>
        <p>Shenjiawan Ferry Ticket Watcher</p>
      </div>
      <el-form @submit.prevent="doLogin" :model="loginForm" label-position="top">
        <el-form-item label="用户名">
          <el-input v-model="loginForm.username" placeholder="admin" prefix-icon="User" size="large" />
        </el-form-item>
        <el-form-item label="密码">
          <el-input v-model="loginForm.password" type="password" placeholder="密码" prefix-icon="Lock"
            size="large" show-password @keyup.enter="doLogin" />
        </el-form-item>
        <el-button type="primary" size="large" style="width:100%;margin-top:8px"
          :loading="loginLoading" @click="doLogin">登录</el-button>
      </el-form>
    </div>
  </div>

  <!-- 主布局 -->
  <div v-else class="layout">
    <!-- 侧边栏 -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">⛴️</div>
        <div>
          <div class="title">渡轮抢票系统</div>
          <div class="subtitle">Ferry Ticket Watcher</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div v-for="item in navItems" :key="item.view"
          class="nav-item" :class="{active: view === item.view}"
          @click="view = item.view">
          <span class="icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </div>
      </nav>
      <div class="sidebar-footer">{{ currentUser?.username }} · {{ currentUser?.role }}</div>
    </div>

    <!-- 主区域 -->
    <div class="main-area">
      <div class="topbar">
        <span class="topbar-title">{{ currentNavLabel }}</span>
        <div class="topbar-right">
          <el-tag type="success" size="small" v-if="seleniumOk">Selenium ✓</el-tag>
          <el-tag type="danger" size="small" v-else>Selenium ✗</el-tag>
          <el-button size="small" text @click="doLogout">退出登录</el-button>
        </div>
      </div>
      <div class="content">
        <tasks-view     v-if="view==='tasks'"      ref="tasksRef" />
        <orders-view    v-if="view==='orders'"     />
        <trips-view     v-if="view==='trips'"      />
        <ports-view     v-if="view==='ports'"      />
        <passengers-view v-if="view==='passengers'" />
        <vehicles-view  v-if="view==='vehicles'"   />
        <accounts-view  v-if="view==='accounts'"   />
        <users-view     v-if="view==='users' && currentUser?.role==='admin'" />
        <settings-view  v-if="view==='settings'"   @saved="checkSelenium" />
      </div>
    </div>
  </div>
  `,

  setup() {
    const isLoggedIn = ref(!!getToken());
    const currentUser = ref(getUser());
    const view = ref("tasks");
    const seleniumOk = ref(false);
    const loginLoading = ref(false);
    const loginForm = reactive({ username: "admin", password: "" });
    const tasksRef = ref(null);

    const navItems = computed(() => {
      const items = [
        { view: "tasks",      icon: "🎫", label: "抢票任务" },
        { view: "orders",     icon: "📋", label: "订单列表" },
        { view: "trips",      icon: "🔎", label: "余票查询" },
        { view: "ports",      icon: "🗺️", label: "港口航线" },
        { view: "passengers", icon: "👥", label: "旅客管理" },
        { view: "vehicles",   icon: "🚗", label: "车辆管理" },
        { view: "accounts",   icon: "🔑", label: "Ferry 账号" },
        { view: "settings",   icon: "⚙️", label: "系统设置" },
      ];
      if (currentUser.value?.role === "admin") {
        items.splice(4, 0, { view: "users", icon: "👤", label: "用户管理" });
      }
      return items;
    });

    const currentNavLabel = computed(() =>
      navItems.value.find(i => i.view === view.value)?.label || ""
    );

    async function doLogin() {
      loginLoading.value = true;
      try {
        const res = await http.post("/api/auth/login", loginForm);
        setAuth(res.access_token, res.user);
        isLoggedIn.value = true;
        currentUser.value = res.user;
        ElMessage.success("登录成功");
        checkSelenium();
      } catch (e) {
        ElMessage.error(e.message);
      } finally {
        loginLoading.value = false;
      }
    }

    function doLogout() {
      clearAuth();
      isLoggedIn.value = false;
    }

    async function checkSelenium() {
      try {
        const r = await http.get("/api/selenium/health");
        seleniumOk.value = r.ok && r.ready;
      } catch { seleniumOk.value = false; }
    }

    onMounted(() => {
      if (isLoggedIn.value) checkSelenium();
    });

    return { isLoggedIn, currentUser, view, seleniumOk, loginLoading, loginForm,
             navItems, currentNavLabel, doLogin, doLogout, checkSelenium, tasksRef };
  }
};

// ══════════════════════════════════════════════════════════
// 抢票任务视图
// ══════════════════════════════════════════════════════════
const TasksView = {
  template: `
  <div>
    <div class="page-header">
      <h3>抢票任务</h3>
      <el-button type="primary" @click="openCreate">+ 新建任务</el-button>
    </div>

    <div v-if="tasks.length === 0" style="text-align:center;padding:60px;color:#999">
      暂无任务，点击右上角新建
    </div>
    <div class="task-grid">
      <template v-for="group in groupedTasks" :key="group.main.id">
        <div class="task-card" @click="openLogs(group.main)">
          <div class="task-card-header">
            <div class="task-route">
              <span>{{ group.main.departure_name }}</span>
              <span style="color:#1a6fb3">→</span>
              <span>{{ group.main.destination_name }}</span>
            </div>
            <el-tag :type="statusType(group.main.status)" size="small">{{ statusLabel(group.main.status) }}</el-tag>
          </div>
          <div class="task-meta">
            <div class="task-meta-item">日期：<span>{{ group.main.travel_date }}</span></div>
            <div class="task-meta-item">票种：<span>{{ group.main.ticket_type }}</span></div>
            <div class="task-meta-item" v-if="group.main.seat_classes && group.main.seat_classes.length">舱位：<span>{{ group.main.seat_classes.join(' / ') }}</span></div>
            <div class="task-meta-item" v-if="group.main.vehicle_id">车牌：<span>{{ vehicles.find(v=>v.id===group.main.vehicle_id)?.plate_number || group.main.vehicle_id }}</span></div>
            <div class="task-meta-item" v-if="splitSummary(group.main)">拆单：<span>{{ splitSummary(group.main) }}</span></div>
            <div class="task-meta-item">触发：<span>{{ triggerLabel(group.main) }}</span></div>
            <div class="task-meta-item">创建：<span>{{ fmtDate(group.main.created_at) }}</span></div>
          </div>
          <div class="task-footer">
            <div class="task-passengers">旅客 {{ displayPassengerCount(group.main) }} 人</div>
            <div style="display:flex;gap:8px" @click.stop>
              <el-button v-if="group.main.status==='pending'||group.main.status==='stopped'||group.main.status==='failed'"
                type="primary" size="small" @click="startTask(group.main)">启动</el-button>
              <el-button v-if="group.main.status==='running'||group.main.status==='waiting'"
                type="warning" size="small" @click="stopTask(group.main)">停止</el-button>
              <el-button v-if="group.main.status!=='running'&&group.main.status!=='waiting'"
                size="small" plain @click="openEdit(group.main)">编辑</el-button>
              <el-button type="danger" size="small" plain @click="deleteTask(group.main)">删除</el-button>
            </div>
          </div>
        </div>
        <div v-if="group.children.length" class="child-tasks">
          <div v-for="child in group.children" :key="child.id"
            class="task-card child-task-card" @click="openLogs(child)">
            <div class="task-card-header">
              <div class="task-route" style="font-size:14px">
                <span style="color:#888;font-size:12px;margin-right:4px">🔗关联旅客单</span>
                {{ child.departure_name }} → {{ child.destination_name }}
              </div>
              <el-tag :type="statusType(child.status)" size="small">{{ statusLabel(child.status) }}</el-tag>
            </div>
            <div class="task-meta">
              <div class="task-meta-item">旅客：<span>{{ child.passenger_ids.length }} 人</span></div>
              <div class="task-meta-item" v-if="child.seat_classes && child.seat_classes.length">舱位：<span>{{ child.seat_classes.join(' / ') }}</span></div>
            </div>
            <div class="task-footer">
              <div class="task-passengers" style="color:#1a6fb3;font-size:12px">超员拆单 · 等待 #{{ child.parent_task_id }} 抢到车票后同班次下单</div>
              <div @click.stop style="display:flex;gap:8px">
                <el-button size="small" plain @click="openEdit(child)">编辑</el-button>
                <el-button type="danger" size="small" plain @click="deleteTask(child)">删除</el-button>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- 新建任务抽屉 -->
    <el-drawer v-model="createDrawer" :title="editMode ? '编辑任务 #' + editTaskId : '新建抢票任务'" size="480px" direction="rtl">
      <el-form :model="form" label-width="88px" size="default">
        <el-form-item label="Ferry账号" required>
          <el-select v-model="form.account_id" placeholder="选择账号" style="width:100%">
            <el-option v-for="a in accounts" :key="a.id"
              :label="a.phone + (a.remark ? ' (' + a.remark + ')' : '')" :value="a.id" />
          </el-select>
        </el-form-item>
        <el-form-item label="出发港口" required>
          <el-select v-model="departureNum" placeholder="选择出发港" style="width:100%"
            :disabled="editMode" @change="onDepartureChange">
            <el-option v-for="p in departurePorts" :key="p.num" :label="p.name" :value="p.num" />
          </el-select>
        </el-form-item>
        <el-form-item label="到达港口" required>
          <el-select v-model="destinationNum" placeholder="先选出发港" style="width:100%"
            :disabled="editMode || !departureNum">
            <el-option v-for="p in destinationPorts" :key="p.num" :label="p.name" :value="p.num" />
          </el-select>
        </el-form-item>
        <el-form-item label="出行日期" required>
          <el-date-picker v-model="form.travel_date" type="date" placeholder="选择日期"
            value-format="YYYY-MM-DD" style="width:100%" :disabled-date="disablePassedDate" />
        </el-form-item>
        <el-form-item label="票种">
          <el-radio-group v-model="form.ticket_type">
            <el-radio value="旅客">旅客</el-radio>
            <el-radio value="小客车及随车人员">小客车</el-radio>
          </el-radio-group>
        </el-form-item>
        <el-form-item label="旅客" required>
          <div style="width:100%">
            <el-checkbox-group v-model="form.passenger_ids">
              <el-checkbox v-for="p in passengers" :key="p.id" :value="p.id" style="margin-bottom:4px;display:block">
                {{ p.name }}（{{ p.id_type }}：{{ p.id_number }}）
              </el-checkbox>
            </el-checkbox-group>
            <div v-if="passengers.length===0" style="color:#999;font-size:12px">
              请先在"旅客管理"中添加旅客
            </div>
          </div>
        </el-form-item>
        <el-form-item v-if="form.ticket_type==='\u5c0f\u5ba2\u8f66\u53ca\u968f\u8f66\u4eba\u5458'" label="车辆" required>
          <el-select v-model="form.vehicle_id" placeholder="选择车辆" style="width:100%" clearable>
            <el-option v-for="v in vehicles" :key="v.id"
              :label="v.plate_number + (v.owner_name ? ' — ' + v.owner_name : '') + (v.vehicle_type ? ' (' + v.vehicle_type + ')' : '')"
              :value="v.id" />
          </el-select>
          <div v-if="vehicles.length===0" style="color:#f56c6c;font-size:12px;margin-top:4px">
            请先在“车辆管理”中添加车辆
          </div>
        </el-form-item>
        <el-form-item v-if="form.ticket_type==='\u5c0f\u5ba2\u8f66\u53ca\u968f\u8f66\u4eba\u5458'" label="驾驶员" required>
          <el-select v-model="form.driver_passenger_id" placeholder="从已选旅客中选择驾驶员" style="width:100%">
            <el-option v-for="p in passengers.filter(p=>form.passenger_ids.includes(p.id))" :key="p.id"
              :label="p.name + '（' + p.id_type + '：' + p.id_number + '）'"
              :value="p.id" />
          </el-select>
          <div style="font-size:12px;color:#aaa;margin-top:2px">驾驶员条目将使用车辆舱位，车牌填入该旅客名下</div>
        </el-form-item>
        <el-form-item label="舱位偏好">
          <el-checkbox-group v-model="form.seat_classes">
            <el-checkbox value="上舱">上舱</el-checkbox>
            <el-checkbox value="中舱">中舱</el-checkbox>
            <el-checkbox value="下前舱">下前舱</el-checkbox>
            <el-checkbox value="下舱卧">下舱卧</el-checkbox>
            <el-checkbox value="商务B">商务B</el-checkbox>
          </el-checkbox-group>
          <div style="font-size:12px;color:#aaa;margin-top:2px">不勾选则任意舱位有票即抢</div>
        </el-form-item>
        <el-form-item label="开航时段">
          <div style="display:flex;align-items:center;gap:8px">
            <el-time-picker v-model="sailTimeFrom" placeholder="不限起始"
              value-format="HH:mm" format="HH:mm" style="width:110px" clearable />
            <span style="color:#aaa">—</span>
            <el-time-picker v-model="sailTimeTo" placeholder="不限截止"
              value-format="HH:mm" format="HH:mm" style="width:110px" clearable />
          </div>
          <div style="font-size:12px;color:#aaa;margin-top:2px">不填则不限开航时段</div>
        </el-form-item>
        <template v-if="form.ticket_type==='\u5c0f\u5ba2\u8f66\u53ca\u968f\u8f66\u4eba\u5458'">
          <el-divider />
          <div style="margin-bottom:12px">
            <div v-if="splitEligible && !linkedForm.enabled">
              <el-button size="small" @click="linkedForm.enabled=true">启用超员拆单</el-button>
              <div style="font-size:12px;color:#aaa;margin-top:8px">
                超过 3 名旅客后，可手动拆成“主任务仅驾驶员 + 旅客票任务”。
              </div>
            </div>
            <template v-else-if="linkedForm.enabled">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <span style="font-weight:600;color:#1a6fb3">超员拆单</span>
                <el-button size="small" text @click="linkedForm.enabled=false">移除</el-button>
              </div>
              <div style="font-size:12px;color:#666;margin-bottom:8px">
                主任务仅保留驾驶员 {{ driverPassengerName || '—' }}；其余 {{ splitPassengerIds.length }} 名旅客将进入旅客票任务。
              </div>
              <div style="font-size:12px;color:#aaa;margin-bottom:8px" v-if="splitPassengerNames.length">
                拆单旅客：{{ splitPassengerNames.join('、') }}
              </div>
              <div style="font-size:12px;color:#aaa;margin-bottom:8px">
                抢到车票后，关联旅客单会直接复用同一班次下单。
              </div>
              <el-form-item label="拆单舱位" style="margin-bottom:0">
                <el-checkbox-group v-model="linkedForm.seat_classes">
                  <el-checkbox value="上舱">上舱</el-checkbox>
                  <el-checkbox value="中舱">中舱</el-checkbox>
                  <el-checkbox value="下前舱">下前舱</el-checkbox>
                  <el-checkbox value="下舱卧">下舱卧</el-checkbox>
                  <el-checkbox value="商务B">商务B</el-checkbox>
                </el-checkbox-group>
              </el-form-item>
            </template>
          </div>
        </template>

        <el-form-item label="触发方式" required>
          <el-radio-group v-model="form.trigger_type">
            <el-radio value="poll">随机轮询（1~10s）</el-radio>
            <el-radio value="schedule">定时开售</el-radio>
          </el-radio-group>
        </el-form-item>
        <el-form-item v-if="form.trigger_type==='schedule'" label="触发时间">
          <el-date-picker v-model="scheduleTime" type="datetime" placeholder="选择开售时间"
            value-format="YYYY-MM-DDTHH:mm:ss" style="width:100%" />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="createDrawer=false">取消</el-button>
        <el-button v-if="!editMode" type="primary" :loading="creating" @click="submitCreate">创建并启动</el-button>
        <el-button v-else type="primary" :loading="creating" @click="submitEdit">保存修改</el-button>
      </template>
    </el-drawer>

    <!-- 日志抽屉 -->
    <el-drawer v-model="logDrawer" :title="logTitle" size="600px" direction="rtl">
      <div v-if="logTask">
        <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
          <el-tag :type="statusType(logTask.status)">{{ statusLabel(logTask.status) }}</el-tag>
          <span style="font-size:13px;color:#666">
            {{ logTask.departure_name }} → {{ logTask.destination_name }} · {{ logTask.travel_date }}
          </span>
        </div>
      </div>
      <div class="log-container" ref="logEl">
        <div v-for="(l, i) in logs" :key="i" class="log-line" :class="l.level">
          <span class="log-time">{{ fmtDate(l.created_at) }}</span>
          <span class="log-badge">[{{ l.level }}]</span>
          {{ l.message }}
        </div>
        <div v-if="logs.length===0" style="color:#666;text-align:center;padding:20px">暂无日志</div>
      </div>
    </el-drawer>
  </div>
  `,

  setup() {
    const tasks = ref([]);
    const accounts = ref([]);
    const passengers = ref([]);
    const vehicles = ref([]);
    const routes = ref([]);
    const createDrawer = ref(false);
    const logDrawer = ref(false);
    const creating = ref(false);
    const logTask = ref(null);
    const logs = ref([]);
    const logEl = ref(null);
    let wsConn = null;

    const departureNum = ref(null);
    const destinationNum = ref(null);
    const scheduleTime = ref("");
    const sailTimeFrom = ref("");
    const sailTimeTo = ref("");
    const linkedForm = reactive({ enabled: false, seat_classes: [] });
    const editMode = ref(false);
    const editTaskId = ref(null);
    const CAR_TICKET_TYPE = "小客车及随车人员";

    const form = reactive({
      account_id: null,
      travel_date: "",
      ticket_type: "旅客",
      seat_classes: [],
      sail_time_from: "",
      sail_time_to: "",
      vehicle_id: null,
      driver_passenger_id: null,
      passenger_ids: [],
      trigger_type: "poll",
    });

    const departurePorts = computed(() => {
      const seen = new Set();
      return routes.value
        .filter(r => { const ok = !seen.has(r.start_port_num); seen.add(r.start_port_num); return ok; })
        .map(r => ({ num: r.start_port_num, name: r.start_port_name }));
    });

    const destinationPorts = computed(() => {
      if (!departureNum.value) return [];
      return routes.value
        .filter(r => r.start_port_num === departureNum.value)
        .map(r => ({ num: r.end_port_num, name: r.end_port_name }));
    });

    const splitEligible = computed(() =>
      form.ticket_type === CAR_TICKET_TYPE &&
      form.passenger_ids.length > 3 &&
      !!form.driver_passenger_id
    );

    const splitPassengerIds = computed(() =>
      form.passenger_ids.filter(id => id !== form.driver_passenger_id)
    );

    const driverPassengerName = computed(() =>
      passengers.value.find(p => p.id === form.driver_passenger_id)?.name || ""
    );

    const splitPassengerNames = computed(() =>
      passengers.value
        .filter(p => splitPassengerIds.value.includes(p.id))
        .map(p => p.name)
    );

    function onDepartureChange() { destinationNum.value = null; }

    function disablePassedDate(d) { return d < new Date(new Date().setHours(0,0,0,0)); }

    function findRelatedSplitTask(mainTaskId) {
      return tasks.value.find(t => t.parent_task_id === mainTaskId) || null;
    }

    function splitSummary(task) {
      const related = findRelatedSplitTask(task.id);
      if (related) return "超员拆单";
      return "";
    }

    function displayPassengerCount(task) {
      const related = findRelatedSplitTask(task.id);
      return task.passenger_ids.length + (related ? related.passenger_ids.length : 0);
    }

    const groupedTasks = computed(() => {
      return tasks.value
        .filter(t => !t.parent_task_id && !t.split_source_task_id)
        .map(t => ({
          main: t,
          children: tasks.value.filter(c => c.parent_task_id === t.id || c.split_source_task_id === t.id),
        }));
    });

    async function load() {
      [tasks.value, accounts.value, passengers.value, vehicles.value] = await Promise.all([
        http.get("/api/tasks/"), http.get("/api/accounts/"), http.get("/api/passengers/"),
        http.get("/api/vehicles/"),
      ]);
      try {
        const r = await http.get("/api/ports/");
        routes.value = r.routes;
      } catch {}
    }

    async function openCreate() {
      editMode.value = false;
      editTaskId.value = null;
      departureNum.value = null;
      destinationNum.value = null;
      form.account_id = null;
      form.travel_date = "";
      form.ticket_type = "旅客";
      form.seat_classes = [];
      form.sail_time_from = "";
      form.sail_time_to = "";
      form.vehicle_id = null;
      form.driver_passenger_id = null;
      form.passenger_ids = [];
      form.trigger_type = "poll";
      scheduleTime.value = "";
      sailTimeFrom.value = "";
      sailTimeTo.value = "";
      linkedForm.enabled = false;
      linkedForm.seat_classes = [];
      createDrawer.value = true;
    }

    function buildLinkedPassengerPayload() {
      if (!linkedForm.enabled) return null;
      return {
        enabled: true,
        seat_classes: [...linkedForm.seat_classes],
      };
    }

    async function submitCreate() {
      if (!form.account_id) return ElMessage.warning("请选择 Ferry 账号");
      if (!departureNum.value) return ElMessage.warning("请选择出发港");
      if (!destinationNum.value) return ElMessage.warning("请选择到达港");
      if (!form.travel_date) return ElMessage.warning("请选择日期");
      if (form.trigger_type === "schedule" && !scheduleTime.value)
        return ElMessage.warning("定时开售请选择触发时间");
      if (!form.passenger_ids.length) return ElMessage.warning("请选择至少一名旅客");
      if (form.ticket_type === "小客车及随车人员" && !form.vehicle_id)
        return ElMessage.warning("小客车票请选择车辆");
      if (form.ticket_type === "小客车及随车人员" && !form.driver_passenger_id)
        return ElMessage.warning("小客车票请指定驾驶员");
      if (linkedForm.enabled && !splitEligible.value)
        return ElMessage.warning("启用超员拆单前，请确认旅客人数超过 3 人且已指定驾驶员");

      const dep = departurePorts.value.find(p => p.num === departureNum.value);
      const dst = destinationPorts.value.find(p => p.num === destinationNum.value);
      const trigVal = form.trigger_type === "poll" ? "" : scheduleTime.value;

      creating.value = true;
      try {
        const task = await http.post("/api/tasks/", {
          ...form,
          departure_num: departureNum.value,
          departure_name: dep?.name || "",
          destination_num: destinationNum.value,
          destination_name: dst?.name || "",
          trigger_value: trigVal,
          sail_time_from: sailTimeFrom.value || "",
          sail_time_to: sailTimeTo.value || "",
          linked_passenger_task: buildLinkedPassengerPayload(),
        });
        await http.post(`/api/tasks/${task.id}/start`);
        ElMessage.success(linkedForm.enabled
          ? "任务已创建并启动，关联旅客拆单将在车辆票成功后自动触发"
          : "任务已创建并启动");
        createDrawer.value = false;
        await load();
      } catch (e) {
        ElMessage.error(e.message);
      } finally {
        creating.value = false;
      }
    }

    function openEdit(t) {
      if (t.split_source_task_id && t.split_source_task_id !== t.id) {
        const sourceTask = tasks.value.find(task => task.id === t.split_source_task_id);
        if (!sourceTask) {
          ElMessage.warning("请到来源主任务中调整拆单配置");
          return;
        }
        t = sourceTask;
      }
      editMode.value = true;
      editTaskId.value = t.id;
      const relatedSplitTask = findRelatedSplitTask(t.id);
      const combinedPassengerIds = relatedSplitTask
        ? [...new Set([...t.passenger_ids, ...relatedSplitTask.passenger_ids])]
        : [...t.passenger_ids];
      // 填充路线（从 routes 反查 num）
      departureNum.value = t.departure_num;
      destinationNum.value = t.destination_num;
      form.account_id = t.account_id;
      form.travel_date = t.travel_date;
      form.ticket_type = t.ticket_type;
      form.seat_classes = [...t.seat_classes];
      form.sail_time_from = t.sail_time_from || "";
      form.sail_time_to = t.sail_time_to || "";
      form.vehicle_id = t.vehicle_id || null;
      form.driver_passenger_id = t.driver_passenger_id || null;
      form.passenger_ids = combinedPassengerIds;
      form.trigger_type = t.trigger_type;
      sailTimeFrom.value = t.sail_time_from || "";
      sailTimeTo.value = t.sail_time_to || "";
      scheduleTime.value = t.trigger_type === "schedule" ? t.trigger_value : "";
      linkedForm.enabled = !!relatedSplitTask;
      linkedForm.seat_classes = relatedSplitTask ? [...(relatedSplitTask.seat_classes || [])] : [];
      createDrawer.value = true;
    }

    async function submitEdit() {
      if (!form.account_id) return ElMessage.warning("请选择 Ferry 账号");
      if (!form.travel_date) return ElMessage.warning("请选择日期");
      if (form.trigger_type === "schedule" && !scheduleTime.value)
        return ElMessage.warning("定时开售请选择触发时间");
      if (!form.passenger_ids.length) return ElMessage.warning("请选择至少一名旅客");
      if (form.ticket_type === "小客车及随车人员" && !form.vehicle_id)
        return ElMessage.warning("小客车票请选择车辆");
      if (form.ticket_type === "小客车及随车人员" && !form.driver_passenger_id)
        return ElMessage.warning("小客车票请指定驾驶员");
      if (linkedForm.enabled && !splitEligible.value)
        return ElMessage.warning("启用超员拆单前，请确认旅客人数超过 3 人且已指定驾驶员");

      const trigVal = form.trigger_type === "poll" ? "" : scheduleTime.value;
      creating.value = true;
      try {
        await http.put(`/api/tasks/${editTaskId.value}`, {
          account_id: form.account_id,
          travel_date: form.travel_date,
          ticket_type: form.ticket_type,
          seat_classes: form.seat_classes,
          sail_time_from: sailTimeFrom.value || "",
          sail_time_to: sailTimeTo.value || "",
          vehicle_id: form.vehicle_id,
          driver_passenger_id: form.driver_passenger_id,
          passenger_ids: form.passenger_ids,
          trigger_type: form.trigger_type,
          trigger_value: trigVal,
          linked_passenger_task: buildLinkedPassengerPayload(),
        });
        ElMessage.success("任务已更新");
        createDrawer.value = false;
        await load();
      } catch (e) {
        ElMessage.error(e.message);
      } finally {
        creating.value = false;
      }
    }

    async function startTask(t) {
      try {
        await http.post(`/api/tasks/${t.id}/start`);
        ElMessage.success("任务已启动"); load();
      } catch (e) { ElMessage.error(e.message); }
    }

    async function stopTask(t) {
      try {
        await http.post(`/api/tasks/${t.id}/stop`);
        ElMessage.success("任务已停止"); load();
      } catch (e) { ElMessage.error(e.message); }
    }

    async function deleteTask(t) {
      await ElMessageBox.confirm(`确认删除任务 #${t.id}？`, "删除确认", { type: "warning" });
      try {
        await http.delete(`/api/tasks/${t.id}`);
        ElMessage.success("已删除"); load();
      } catch (e) { ElMessage.error(e.message); }
    }

    const logTitle = computed(() =>
      logTask.value ? `任务 #${logTask.value.id} 实时日志` : "日志"
    );

    async function openLogs(t) {
      logTask.value = t;
      logDrawer.value = true;
      logs.value = await http.get(`/api/tasks/${t.id}/logs?limit=200`);
      nextTick(() => { if (logEl.value) logEl.value.scrollTop = logEl.value.scrollHeight; });

      // WebSocket 订阅实时日志
      if (wsConn) wsConn.close();
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      wsConn = new WebSocket(`${proto}//${location.host}/ws/tasks/${t.id}/logs`);
      wsConn.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        if (data.ping) return;
        logs.value.push({ level: data.level, message: data.message, created_at: new Date().toISOString() });
        nextTick(() => { if (logEl.value) logEl.value.scrollTop = logEl.value.scrollHeight; });
      };
    }

    watch(logDrawer, v => { if (!v && wsConn) { wsConn.close(); wsConn = null; } });

    watch(() => [...form.passenger_ids], (ids) => {
      if (form.driver_passenger_id && !ids.includes(form.driver_passenger_id)) {
        form.driver_passenger_id = null;
      }
    });

    watch(() => form.ticket_type, (ticketType) => {
      if (ticketType !== CAR_TICKET_TYPE) {
        form.vehicle_id = null;
        form.driver_passenger_id = null;
        linkedForm.enabled = false;
      }
    });

    watch(splitEligible, (eligible) => {
      if (!eligible) linkedForm.enabled = false;
    });

    function triggerLabel(t) {
      return t.trigger_type === "poll" ? `随机轮询(1~10s)` : `定时 ${t.trigger_value}`;
    }

    onMounted(load);

    return { tasks, accounts, passengers, vehicles, routes, createDrawer, logDrawer, creating,
             logTask, logs, logEl, form, departureNum, destinationNum, departurePorts,
             destinationPorts, scheduleTime, sailTimeFrom, sailTimeTo, onDepartureChange,
             disablePassedDate, openCreate, submitCreate, startTask, stopTask,
             deleteTask, openLogs, logTitle, triggerLabel, fmtDate, statusLabel, statusType,
             linkedForm, groupedTasks, editMode, editTaskId, openEdit, submitEdit,
             splitEligible, splitPassengerIds, splitPassengerNames, driverPassengerName,
             splitSummary, displayPassengerCount };
  }
};

const TripsView = {
  template: `
  <div>
    <div class="page-header">
      <h3>余票查询</h3>

    <!-- 查询条件 -->
    <el-card style="margin-bottom:20px">
      <el-form :model="query" inline label-width="90px" @submit.prevent="doQuery">
        <el-form-item label="Ferry账号">
          <el-select v-model="query.account_id" placeholder="选择账号" style="width:180px">
            <el-option v-for="a in accounts" :key="a.id"

        </el-form-item>
        <el-form-item label="到达港">
          <el-select v-model="query.end_port_no" placeholder="先选出发港" style="width:160px" :disabled="!query.start_port_no">
            <el-option v-for="p in destinationPorts" :key="p.num" :label="p.name" :value="p.num" />
          </el-select>
        </el-form-item>
        <el-form-item label="票种">
          <el-radio-group v-model="query.require_vehicle">
            <el-radio :value="false">旅客票</el-radio>
            <el-radio :value="true">人车票</el-radio>
          </el-radio-group>
        </el-form-item>
        <el-form-item label="日期">
          <el-date-picker v-model="query.date" type="date" placeholder="选择日期"
            value-format="YYYY-MM-DD" style="width:150px" :disabled-date="isDateDisabled" />
          <span v-if="saleDate" style="margin-left:8px;font-size:12px;color:#888">可购至 {{ saleDate }}</span>
          <span v-if="saleDateLoading" style="margin-left:8px;font-size:12px;color:#aaa">查询中...</span>
        </el-form-item>
        <el-form-item>
          <el-button type="primary" :loading="loading" @click="doQuery" native-type="submit">查询</el-button>
        </el-form-item>
      </el-form>
    </el-card>

    <!-- 结果 -->
    <div v-if="queried">
      <div v-if="trips.length === 0" style="text-align:center;padding:40px;color:#999">
        该日期暂无班次
      </div>
      <el-table v-else :data="trips" border stripe>
        <el-table-column label="船名" prop="shipName" width="110" />
        <el-table-column label="航线" prop="lineName" width="120" />
        <el-table-column label="开航时间" width="90">
          <template #default="{row}">{{ row.sailTime }}</template>
        </el-table-column>
        <el-table-column label="旅客舱位" min-width="200">
          <template #default="{row}">
            <span v-if="!row.seatClasses || row.seatClasses.length === 0" style="color:#aaa">—</span>
            <el-tag v-for="sc in row.seatClasses" :key="sc.classNum"
              style="margin:2px"
              :type="seatTagType(sc.totalCount)">
              {{ sc.className }}
              <template v-if="sc.totalCount > 0">：{{ sc.totalCount }} 张 ¥{{ sc.totalPrice }}</template>
              <template v-else>：售罄</template>
            </el-tag>
          </template>
        </el-table-column>
        <el-table-column label="车辆舱位" min-width="160">
          <template #default="{row}">
            <span v-if="!row.driverSeatClass || row.driverSeatClass.length === 0" style="color:#aaa">—</span>
            <el-tag v-for="dc in row.driverSeatClass" :key="dc.classNum"
              style="margin:2px"
              :type="seatTagType(dc.totalCount)">
              {{ dc.className }}
              <template v-if="dc.totalCount > 0">：{{ dc.totalCount }} 辆 ¥{{ dc.totalPrice }}</template>
              <template v-else>：售罄</template>
            </el-tag>
          </template>
        </el-table-column>
        <el-table-column label="航班类型" width="110" prop="hxlxm" />
        <el-table-column label="状态" width="90">
          <template #default="{row}">
            <el-tag :type="row.onSale ? 'success' : 'danger'" size="small">
              {{ row.onSale ? '在售' : row.offSaleMsg || '未开售' }}
            </el-tag>
          </template>
        </el-table-column>
      </el-table>
    </div>
  </div>
  `,
  setup() {
    const accounts = ref([]);
    const routes = ref([]);
    const trips = ref([]);
    const loading = ref(false);
    const queried = ref(false);
    const saleDate = ref(null);       // "YYYY-MM-DD" 最远可购票日
    const saleDateLoading = ref(false);

    const query = reactive({
      account_id: null,
      start_port_no: null,
      end_port_no: null,
      date: new Date().toLocaleDateString("sv"),  // YYYY-MM-DD format
      require_vehicle: false,
    });

    const departurePorts = computed(() => {
      const seen = new Set();
      return routes.value
        .filter(r => { const ok = !seen.has(r.start_port_num); seen.add(r.start_port_num); return ok; })
        .map(r => ({ num: r.start_port_num, name: r.start_port_name }));
    });

    const destinationPorts = computed(() => {
      if (!query.start_port_no) return [];
      return routes.value
        .filter(r => r.start_port_num === query.start_port_no)
        .map(r => ({ num: r.end_port_num, name: r.end_port_name }));
    });

    function onDepartureChange() { query.end_port_no = null; }

    async function loadSaleDate(accountId) {
      if (!accountId) { saleDate.value = null; return; }
      saleDateLoading.value = true;
      try {
        const r = await http.get(`/api/trips/sale-date?account_id=${accountId}`);
        saleDate.value = r.sale_date || null;
      } catch { saleDate.value = null; }
      finally { saleDateLoading.value = false; }
    }

    function isDateDisabled(d) {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      if (d < today) return true;
      if (saleDate.value) {
        const max = new Date(saleDate.value); max.setHours(23, 59, 59, 999);
        if (d > max) return true;
      }
      return false;
    }

    function seatTagType(count) {
      if (count <= 0) return "danger";
      if (count <= 5) return "warning";
      return "success";
    }

    async function load() {
      try {
        [accounts.value] = await Promise.all([http.get("/api/accounts/")]);
        if (accounts.value.length) {
          query.account_id = accounts.value[0].id;
          loadSaleDate(query.account_id);
        }
      } catch {}
      try {
        const r = await http.get("/api/ports/");
        routes.value = r.routes;
      } catch {}
    }

    watch(() => query.account_id, (id) => loadSaleDate(id));

    async function doQuery() {
      if (!query.account_id) return ElMessage.warning("请选择 Ferry 账号");
      if (!query.start_port_no) return ElMessage.warning("请选择出发港");
      if (!query.end_port_no) return ElMessage.warning("请选择到达港");
      if (!query.date) return ElMessage.warning("请选择日期");
      loading.value = true;
      queried.value = false;
      try {
        const res = await http.post("/api/trips/query", {
          account_id: query.account_id,
          start_port_no: query.start_port_no,
          end_port_no: query.end_port_no,
          date: query.date,
          require_vehicle: query.require_vehicle,
        });
        trips.value = res.trips || [];
        queried.value = true;
      } catch (e) {
        ElMessage.error(e.message);
      } finally {
        loading.value = false;
      }
    }

    onMounted(load);

    return { accounts, routes, trips, loading, queried, query, saleDate, saleDateLoading,
             departurePorts, destinationPorts, onDepartureChange, seatTagType, isDateDisabled, doQuery };
  }
};

      { id: 1019, name: '嵊泗(五龙)',       short: '五龙',   x: 308, y: 405, r: 10, color: '#3b82f6', type: 'ss'    },
      { id: 1034, name: '嵊泗(黄龙)',       short: '黄龙',   x: 372, y: 408, r: 11, color: '#3b82f6', type: 'ss'    },
      { id: 1041, name: '宁波（南）',        short: '宁波',   x:  88, y: 490, r: 12, color: '#22c55e', type: 'main'  },

      { id: 1040, name: '东极(庙子湖)',      short: '东极',   x: 680, y: 448, r: 11, color: '#a855f7', type: 'other' },

    // 计算标签偏移（避免压住圆圈）
    const nodes = NODE_DEFS.map(n => ({
      ...n,
      shortName: n.short,

      labelDy: n.r + 13,

    const nodeMap = {};

    function edgeStyle(s, e) {
      const sType = nodeMap[s]?.type;
      const eType = nodeMap[e]?.type;
      if (sType === 'sh' || eType === 'sh') return { color: '#fb923c', dashed: true, markerColor: 'orange' };
      if ((sType === 'main' || eType === 'main') || (sType === 'other' || eType === 'other'))
        return { color: '#4ade80', dashed: true, markerColor: 'green' };
      return { color: '#60a5fa', dashed: false, markerColor: 'blue' };
    }

    // ── 计算连线坐标（缩短到圆边缘）─────────────────────
    function edgeCoords(sn, en, offset = 0) {
      const dx = en.x - sn.x, dy = en.y - sn.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const ux = dx / len, uy = dy / len;
      // 平行偏移（双向路线分开）
      const ox = -uy * offset, oy = ux * offset;
      return {
        x1: sn.x + ux * (sn.r + 2) + ox,
        y1: sn.y + uy * (sn.r + 2) + oy,
        x2: en.x - ux * (en.r + 8) + ox,
        y2: en.y - uy * (en.r + 8) + oy,
      };
    }

    // 检测是否有反向路线（用于偏移）
    const edgeSet = new Set();

    const connectedIds = computed(() => {
      if (!hoveredId.value) return new Set();
      const s = new Set([hoveredId.value]);
      routes.value.forEach(r => {
        if (r.start_port_num === hoveredId.value) s.add(r.end_port_num);
        if (r.end_port_num === hoveredId.value) s.add(r.start_port_num);
      });
      return s;
    });

    const visibleEdges = computed(() => {
      const seenPairs = new Map();
      routes.value.forEach(r => {
        const key = [r.start_port_num, r.end_port_num].sort().join('-');
        if (!seenPairs.has(key)) seenPairs.set(key, []);
        seenPairs.get(key).push(r);
      });
      const edges = [];
      seenPairs.forEach((rs, key) => {
        rs.forEach((r, i) => {
          const sn = nodeMap[r.start_port_num];
          const en = nodeMap[r.end_port_num];
          if (!sn || !en) return;
          const offset = rs.length > 1 ? (i === 0 ? 4 : -4) : 0;
          const coords = edgeCoords(sn, en, offset);
          const style = edgeStyle(r.start_port_num, r.end_port_num);
          const isConnected = hoveredId.value &&
            (r.start_port_num === hoveredId.value || r.end_port_num === hoveredId.value);
          const isSelected = selected.value &&
            (r.start_port_num === selected.value.id || r.end_port_num === selected.value.id);
          edges.push({
            key: `${r.start_port_num}-${r.end_port_num}-${i}`,
            ...coords,
            ...style,
            highlighted: isConnected || isSelected,
            dimmed: hoveredId.value ? !isConnected : false,
          });
        });
      });
      return edges;
    });

    const nodeCount = computed(() => {
      const ids = new Set();
      routes.value.forEach(r => { ids.add(r.start_port_num); ids.add(r.end_port_num); });
      return ids.size;
    });

    const hoveredName = computed(() => nodeMap[hoveredId.value]?.name || '');

    const outRoutes = computed(() => {
      if (!selected.value) return [];
      return routes.value
        .filter(r => r.start_port_num === selected.value.id)
        .map(r => ({ end: r.end_port_num, endName: r.end_port_name }));
    });

    function onHover(node) { hoveredId.value = node.id; }
    function onLeave() { hoveredId.value = null; }
    function onSelect(node) {
      selected.value = selected.value?.id === node.id ? null : node;
    }

    async function refresh(force = false) {
      loading.value = true;
      try {
        const r = await http.get('/api/ports/?refresh=' + force);
        routes.value = r.routes;
        updatedAt.value = r.updated_at;
      } catch (e) { ElMessage.error(e.message); } finally { loading.value = false; }
    }

    onMounted(() => refresh());

    return {
      routes, updatedAt, loading, showTable, hoveredId, selected,
      svgW, svgH, nodes, visibleEdges, connectedIds, nodeCount,
      hoveredName, outRoutes,
      onHover, onLeave, onSelect, refresh, fmtDate,
    };
  }
};

        );
      } catch (e) { ElMessage.error(e.message); } finally { row._syncing = false; }

    function openCookieDlg(row) {
      cookieTarget.value = row;
      cookieRaw.value = "";
      cookieDlg.value = true;
    }
    async function saveCookies() {
      if (!cookieRaw.value.trim()) return ElMessage.warning("请粘贴 Cookie 字符串");

             cookieDlg, cookieRaw, cookieSaving, cookieTarget, openCookieDlg, saveCookies };
  }
};

      </div>
      <div class="orders-meta-group">
        <span style="font-size:12px;color:#888" v-if="lastRefreshedAt">上次同步：{{ fmtDate(lastRefreshedAt) }}</span>
        <el-button @click="refreshOrders(true)" :loading="refreshing" size="small">🔄 刷新</el-button>
      </div>
    </div>

    <div v-if="orders.length === 0" class="orders-empty">
      暂无订单记录，首次登录或刷新后会自动同步远端订单
    </div>

    <div v-else class="orders-table-card">
    <el-table :data="orders" border stripe class="orders-table">
      <el-table-column label="订单号" prop="order_id" width="196">
        <template #default="{row}">
          <el-tooltip :content="row.order_id" placement="top">
            <span class="order-id">{{ row.order_id }}</span>
          </el-tooltip>
        </template>
      </el-table-column>
      <el-table-column label="航线" min-width="220" show-overflow-tooltip>
        <template #default="{row}">
          <el-tooltip :content="(row.departure_name || '') + ' → ' + (row.destination_name || '')" placement="top">
            <div class="route-cell">
              <div class="route-main">{{ row.departure_name }} → {{ row.destination_name }}</div>
            </div>
          </el-tooltip>
        </template>
      </el-table-column>
      <el-table-column label="出行日期" width="152">
        <template #default="{row}">
          <div class="travel-date-cell">
            <div class="travel-date-main">{{ row.travel_date || '—' }}</div>
          </div>
        </template>
      </el-table-column>
      <el-table-column label="航班" min-width="162">
        <template #default="{row}">
          <div class="sail-cell">
            <div class="sail-main">{{ row.sail_time || '—' }}</div>
            <div class="sail-sub">{{ row.ship_name || '未同步船名' }}</div>
          </div>
        </template>
      </el-table-column>
      <el-table-column label="航型" prop="clxm" width="124">
        <template #default="{row}">
          <span class="travel-date-main" style="font-size:13px;font-weight:500">{{ row.clxm || '—' }}</span>
        </template>
      </el-table-column>
      <el-table-column label="旅客" min-width="180">
        <template #default="{row}">
          <div class="compact-passengers">
            <el-tag v-for="p in row.passengers" :key="p" size="small">{{ p }}</el-tag>
          </div>
        </template>
      </el-table-column>
      <el-table-column label="支付截止" width="168">
        <template #default="{row}">
          <div class="deadline-stack">
            <span class="deadline-main" :style="paymentDeadlineStyle(row)">
              {{ paymentDeadlineText(row) }}
            </span>
            <span v-if="row.status === 'pending_payment' && row.payment_expire_at" class="deadline-sub">
              截止 {{ row.payment_expire_at }}
            </span>
          </div>
        </template>
      </el-table-column>
      <el-table-column label="状态" width="110">
        <template #default="{row}">
          <el-tag :type="statusTagType(row.status)" size="small">{{ row.status_label }}</el-tag>
        </template>
      </el-table-column>
      <el-table-column label="下单时间" width="188">
        <template #default="{row}">
          <div class="travel-date-cell">
            <div class="travel-date-main" style="font-size:13px;font-weight:500">{{ fmtDate(row.remote_created_at || row.created_at) }}</div>
          </div>
        </template>
      </el-table-column>
      <el-table-column label="操作" width="188" fixed="right">
        <template #default="{row}">
          <div class="orders-actions">
            <el-button v-if="row.can_pay" size="small" type="primary" @click="openPay(row)">前往支付</el-button>
            <el-button v-if="row.can_view_detail" size="small" @click="openDetail(row)">显示详情</el-button>
            <el-button size="small" type="danger" plain @click="del(row)">删除</el-button>
          </div>
        </template>
      </el-table-column>
    </el-table>
    </div>

    <el-drawer v-model="detailDrawer" title="订单详情" size="720px" direction="rtl">
      <div v-loading="detailLoading">
        <template v-if="detailOrder">
          <div class="order-detail-grid">
            <div>订单号：<span style="font-family:monospace">{{ detailOrder.order_id }}</span></div>
            <div>状态：<el-tag :type="statusTagType(detailOrder.status)" size="small">{{ detailOrder.status_label }}</el-tag></div>
            <div>航线：{{ detailOrder.departure_name }} → {{ detailOrder.destination_name }}</div>
            <div>出行日期：{{ detailOrder.travel_date }}</div>
            <div>航班：{{ detailOrder.sail_time || '—' }}</div>
            <div>船名：{{ detailOrder.ship_name || '—' }}</div>
            <div>航型：{{ detailOrder.clxm || '—' }}</div>
            <div class="muted">上次同步：{{ fmtDate(detailOrder.remote_created_at || detailOrder.created_at) }}</div>
          </div>
          <el-table :data="detailOrder.order_items || []" border stripe>
            <el-table-column label="旅客" prop="passName" width="100" />
            <el-table-column label="身份信息" prop="credentialNum" min-width="170" />
            <el-table-column label="航线" prop="lineName" min-width="120" />
            <el-table-column label="舱位" prop="seatClassName" width="90" />
            <el-table-column label="座位" prop="seatNumber" width="90" />
            <el-table-column label="金额" width="90">
              <template #default="{row}">¥{{ row.realFee }}</template>
            </el-table-column>
            <el-table-column label="航型" prop="clxm" min-width="110" />
            <el-table-column label="航班类型" prop="hxlxm" min-width="110" />
            <el-table-column label="创建时间" prop="createTime" width="160" />
          </el-table>
        </template>
      </div>
    </el-drawer>
  </div>
  `,
  setup() {
    const orders = ref([]);
    const accounts = ref([]);
    const selectedAccountId = ref(null);
    const refreshing = ref(false);
    const lastRefreshedAt = ref("");
    const selectedStatuses = ref(["pending_payment", "paid"]);
    const nowTs = ref(Date.now());
    const detailDrawer = ref(false);
    const detailLoading = ref(false);
    const detailOrder = ref(null);
    let refreshTimer = null;
    let countdownTimer = null;
    const statusOptions = [
      { value: "pending_payment", label: "待支付", type: "warning" },
      { value: "paid", label: "已支付", type: "success" },
      { value: "cancelled", label: "已取消", type: "info" },
    ];

    const allStatusesSelected = computed(() =>
      statusOptions.every(opt => selectedStatuses.value.includes(opt.value))
    );

    function statusFilterParam() {
      if (allStatusesSelected.value) return "all";
      return selectedStatuses.value.join(",");
    }

    async function load() {
      const filter = encodeURIComponent(statusFilterParam());
      const accountQuery = selectedAccountId.value ? `&account_id=${selectedAccountId.value}` : "";
      orders.value = await http.get(`/api/orders/?status_filter=${filter}${accountQuery}`);
    }

    async function loadAccounts() {
      accounts.value = await http.get("/api/accounts/");
    }

    async function refreshOrders(showMessage = false) {
      refreshing.value = true;
      try {
        const summary = await http.post("/api/orders/sync", selectedAccountId.value ? { account_id: selectedAccountId.value } : {});
        await load();
        lastRefreshedAt.value = new Date().toISOString();
        if (showMessage) {
          const msg = `已同步 ${summary.fetched || 0} 条，新增 ${summary.created || 0} 条，更新 ${summary.updated || 0} 条`;
          if (summary.errors && summary.errors.length) {
            ElMessage.warning(`${msg}，但有 ${summary.errors.length} 条同步异常`);
          } else {
            ElMessage.success(msg);
          }
        }
      } catch (e) {
        if (showMessage) ElMessage.error(e.message);
      } finally {
        refreshing.value = false;
      }
    }

    function isExpired(row) {
      if (row.status !== "pending_payment" || !row.payment_expire_at) return false;
      const expireAt = parseOrderTime(row.payment_expire_at);
      return expireAt ? expireAt.getTime() <= nowTs.value : false;
    }

    function parseOrderTime(value) {
      if (!value || typeof value !== "string") return null;
      const normalized = value.replace(/\//g, "-");
      const parsed = new Date(normalized);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatDuration(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const hms = [hours, minutes, seconds].map(v => String(v).padStart(2, "0")).join(":");
      return days > 0 ? `${days}天 ${hms}` : hms;
    }

    function paymentDeadlineText(row) {
      if (row.status === "paid") return "已支付";
      if (row.status === "cancelled") return "已取消";
      if (!row.payment_expire_at) return "待支付";
      const expireAt = parseOrderTime(row.payment_expire_at);
      if (!expireAt) return row.payment_expire_at;
      const diff = expireAt.getTime() - nowTs.value;
      return diff <= 0 ? "已超时" : formatDuration(diff);
    }

    function paymentDeadlineStyle(row) {
      if (row.status === "paid") return "color:#67c23a";
      if (row.status === "cancelled") return "color:#909399";
      return isExpired(row) ? "color:#f56c6c" : "color:#e6a23c";
    }

    function statusTagType(status) {
      if (status === "pending_payment") return "warning";
      if (status === "paid") return "success";
      return "info";
    }

    function isStatusSelected(status) {
      return selectedStatuses.value.includes(status);
    }

    async function toggleStatus(status) {
      if (isStatusSelected(status)) {
        if (selectedStatuses.value.length === 1) return;
        selectedStatuses.value = selectedStatuses.value.filter(item => item !== status);
      } else {
        selectedStatuses.value = [...selectedStatuses.value, status];
      }
      await load();
    }

    async function selectAllStatuses() {
      selectedStatuses.value = statusOptions.map(opt => opt.value);
      await load();
    }

    function openPay(row) {
      window.open(row.payment_url, "_blank");
    }

    async function openDetail(row) {
      detailLoading.value = true;
      detailDrawer.value = true;
      try {
        detailOrder.value = await http.get(`/api/orders/${row.id}/detail`);
      } catch (e) {
        ElMessage.error(e.message);
      } finally {
        detailLoading.value = false;
      }
    }

    async function del(row) {
      await ElMessageBox.confirm(`确认删除订单 ${row.order_id}？`, "删除确认", { type: "warning" });
      try {
        await http.delete(`/api/orders/${row.id}`);
        ElMessage.success("已删除"); await load();
      } catch (e) { ElMessage.error(e.message); }
    }

    onMounted(async () => {
      await loadAccounts();
      await refreshOrders(false);
      refreshTimer = setInterval(() => refreshOrders(false), 60 * 1000);
      countdownTimer = setInterval(() => { nowTs.value = Date.now(); }, 1000);
    });
    onUnmounted(() => {
      if (refreshTimer) clearInterval(refreshTimer);
      if (countdownTimer) clearInterval(countdownTimer);
      refreshTimer = null;
      countdownTimer = null;
    });
    return {
      orders, accounts, selectedAccountId, load, refreshOrders, refreshing, lastRefreshedAt, isExpired,
      openPay, del, fmtDate, paymentDeadlineText, paymentDeadlineStyle,
      statusOptions, statusTagType, isStatusSelected, toggleStatus,
      allStatusesSelected, selectAllStatuses, detailDrawer, detailLoading,
      detailOrder, openDetail
    };
  }
};

// ──────────────────────────────────────────────────────────
const app = createApp(App);
app.use(ElementPlus, { locale: ElementPlus.zhCn || ElementPlus.lang?.zhCn });
for (const [name, comp] of Object.entries(ElementPlusIconsVue)) {
  app.component(name, comp);
}
app.component("TasksView", TasksView);
app.component("TripsView", TripsView);
app.component("PortsView", PortsView);
app.component("PassengersView", PassengersView);
app.component("VehiclesView", VehiclesView);
app.component("AccountsView", AccountsView);
app.component("UsersView", UsersView);
app.component("SettingsView", SettingsView);
app.component("OrdersView", OrdersView);
app.mount("#app");
</script>
</body>
</html>
